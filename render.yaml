# render.yaml — Deploy Hospora on Render.com
# docs: https://render.com/docs/blueprint-spec

services:
  # ─── Backend ────────────────────────────────────────────────────────────────
  - type: web
    name: hospora-backend
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 3
    rootDir: backend
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          name: hospora-frontend
          type: web
          property: host
          prepend: "https://"
      - key: DATABASE_URL
        sync: false
    disk:
      name: media
      mountPath: /app/media
      sizeGB: 5

  # ─── Frontend ───────────────────────────────────────────────────────────────
  - type: web
    name: hospora-frontend
    runtime: node
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    rootDir: frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: hospora-backend
          type: web
          property: host
          prepend: "https://"
          append: "/api"
